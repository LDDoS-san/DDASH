<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="utf-8" />
<title>Hospital Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="DistanceCalcurate.js"></script>
<script src="RiskCalcurate.js"></script>

<style>
:root {
  --sidebar-w: 320px;
  --outer-gap: 14px;
  --sidebar-h-mobile: 130px;
}
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden; /* 余計なスクロールを消す */
}
* { box-sizing: border-box; }
body {
  padding-bottom: 0;
}

#map {
  position: absolute;
  top: var(--outer-gap);
  right: var(--outer-gap);
  bottom: var(--outer-gap);
  left: calc(var(--sidebar-w) + var(--outer-gap));
}
.legend {
  background: white;
  padding: 10px 12px;
  line-height: 1.3;
  border-radius: 6px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.2);
  font: 13px/1.3 sans-serif;
}
.legend .row { display:flex; align-items:center; margin: 4px 0; }
.legend i {
  width: 14px; height: 14px; margin-right: 8px;
  display:inline-block; border: 1px solid #666;
}



.leaflet-control-settings-btn{
  display: inline-block;
  background: #fff;
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 8px 10px;
  text-decoration: none;
  color: #000;
  box-shadow: 0 1px 6px rgba(0,0,0,0.2);
  font: 14px/1 sans-serif;
}
.leaflet-control-settings-btn:hover{ background:#f5f5f5; }



/* 左サイドバー */
.sidebar {
  position: absolute;
  top: 0;
  left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  z-index: 900; /* 地図より前（ボタンよりは下でもOK） */
  background: #ffffff;
  border-right: 1px solid #ddd;
  box-sizing: border-box;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  font-size: 20px;
}

.panel {
  flex: 1;                 /* 3段を均等に */
  border: 1px solid #ddd;
  border-radius: 10px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  padding: 12px;
  display: flex;
  flex-direction: column;
  justify-content: center; /* 中央寄せ */
  align-items: center;     /* 中央寄せ */
  text-align: center;
}

.panel .label {
  font: 14px/1.2 sans-serif;
  opacity: 0.75;
  margin-bottom: 6px;
}

/* 上・中：数字だけ大きく真ん中 */
.panel .big-number {
  font: 700 64px/1 sans-serif;
}
.denominator {
  font-size: 0.3em; /* 親の50%サイズ */
}

/* 下：全部大きく表示 */
.panel.big-all {
  font: 700 34px/1.1 sans-serif; /* パネル内の文字全部が大きい */
}



/* 地図中央の十字 */
.crosshair {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 28px;
  height: 28px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 1200; /* 地図の上に */
}
.crosshair::before,
.crosshair::after {
  content: "";
  position: absolute;
  background: #111;
  box-shadow: 0 0 2px rgba(255,255,255,0.8); /* 見やすく */
}
.crosshair::before {
  left: 50%;
  top: 0;
  width: 2px;
  height: 100%;
  transform: translateX(-50%);
}
.crosshair::after {
  top: 50%;
  left: 0;
  width: 100%;
  height: 2px;
  transform: translateY(-50%);
}



/* スマホ用：サイドバーを上に */
@media (max-width: 768px) {

  /* サイドバー：上に固定、横並びで折り返し */
  .sidebar {
    position: fixed !important;
    top: var(--outer-gap);
    left: var(--outer-gap);
    right: var(--outer-gap);
    width: auto;
    height: var(--sidebar-h-mobile);
    z-index: 2000;

    display: flex;
    flex-direction: row;   /* ← 縦から横へ */
    flex-wrap: wrap;       /* ← 折り返し */
    gap: 6px;
    padding: 6px;
  }

  /* 地図：サイドバーの下から開始（上のouter-gapも考慮） */
  #map {
    position: absolute !important;
    top: calc(var(--sidebar-h-mobile) + (var(--outer-gap) * 2)) !important;
    right: var(--outer-gap) !important;
    bottom: var(--outer-gap) !important;
    left: var(--outer-gap) !important;
  }

  /* 上2つを半分幅、下1つを横いっぱい */
  .sidebar .panel:nth-child(1),
  .sidebar .panel:nth-child(2) {
    flex: 1 1 48%;
  }
  .sidebar .panel:nth-child(3) {
    flex: 1 1 100%;
  }

  /* 収まりやすいように余白と文字を少し詰める */
  .panel { padding: 6px; min-height: 0; }
  .panel .label { font-size: 12px; }
  .panel .big-number { font-size: 26px; }
  .denominator { font-size: 0.3em; /* 親の50%サイズ */}
  .panel.big-all { font-size: 20px; }

  /* 凡例も小さめ */
  .legend {
    padding: 6px 8px;
    font-size: 11px;
    line-height: 1.2;
    max-width: 220px;
  }
  .legend .row { margin: 2px 0; }
  .legend i { width: 12px; height: 12px; margin-right: 6px; }
  .legend input[type="checkbox"] { transform: scale(0.9); }
}

</style>
</head>
<body>

<div class="sidebar">
<!-- 上段 -->
<div class="panel">
  <div class="label">熱中症リスク</div>
  <div class="big-number">
    <span id="riskNum">--</span>
    <span class="denominator">/100</span>
  </div>
  <div class="label"><span id="riskLevel">--</span></div>
</div>

<!-- 中段 -->
<div class="panel">
  <div class="label">救急車到着まで</div>
  <div class="big-number"><span id="etaNum">--</span>分</div>
</div>

<!-- 下段（全部大きく） -->
<div class="panel big-all">
  後遺症あり
</div>

<button id="startSimulationBtn">シミュレーション開始</button>

</div>
<div id="map"></div>


<script>
let simulationRouteLayer = null;
/** ---------- Map ---------- */
var map = L.map('map');
// 病院CSVを1回だけ読み込み（hospital.js側のデフォルトCSV名を使用）
const hospitalsReady = HospitalLib.loadHospitalsFromCSV();
// 地図中央に十字
L.DomUtil.create('div', 'crosshair', map.getContainer());

async function updateEtaFromMapCenter() {
  try {
    await hospitalsReady; // CSV読み込み完了を待つ

    const c = map.getCenter(); // 十字の位置＝地図中心
    const r = HospitalLib.estimateTimeToNearestHospital(c.lat, c.lng);

    // 分で表示（四捨五入）
    const minutes = Math.max(0, Math.round(r.minutes));
    const etaEl = document.getElementById('etaNum');
    if (etaEl) etaEl.textContent = String(minutes);

    // ついでに必要ならコンソールに距離も
    // console.log('center', c.lat, c.lng, 'nearest', r.hospital?.name, r.distance_km, 'km');
  } catch (e) {
    console.error(e);
    const etaEl = document.getElementById('etaNum');
    if (etaEl) etaEl.textContent = '--';
  }
}

function maxWbgtAtIdx(idx) {
  // その地点の「日最大WBGT」（24回なめるだけ）
  let max = -Infinity;
  for (const t of RiskLib.DATA.times) {
    const v = RiskLib.DATA.wbgt[t][idx];
    if (v > max) max = v;
  }
  return max;
}

function updateRiskFromMapCenter() {
  try {
    if (!window.RiskLib) return;

    const c = map.getCenter();
    const idx = RiskLib.nearestGridIndex(c.lat, c.lng); // 地点ナンバー（配列index）:contentReference[oaicite:5]{index=5}

    const wbgt = maxWbgtAtIdx(idx);

    // ひとまず固定パラメータ（必要ならsettings.htmlから渡す）
    const age = 30;
    const met = 4.0;
    const water = 0;

    const [score, level] = RiskLib.riskScoreFromWbgtFine(wbgt, age, met, water); // :contentReference[oaicite:6]{index=6}

    const riskEl = document.getElementById('riskNum');
    const levelEl = document.getElementById('riskLevel');
    if (riskEl) riskEl.textContent = String(score);
    if (levelEl) levelEl.textContent = level;

  } catch (e) {
    console.error(e);
    const riskEl = document.getElementById('riskNum');
    const levelEl = document.getElementById('riskLevel');
    if (riskEl) riskEl.textContent = '--';
    if (levelEl) levelEl.textContent = '--';
  }
}

map.on('moveend zoomend', () => {
  updateEtaFromMapCenter();
  updateRiskFromMapCenter();
});

// 初回
setTimeout(() => {
  updateEtaFromMapCenter();
  updateRiskFromMapCenter();
}, 300);

function fixMapSizeOnResize() {
  // CSS切り替え後にLeafletへ「サイズ変わったよ」と通知
  setTimeout(() => map.invalidateSize(), 200);
}

window.addEventListener('resize', fixMapSizeOnResize);
window.addEventListener('orientationchange', fixMapSizeOnResize);

// 初回も一回
fixMapSizeOnResize();

// pane（重なり順）を明示：ポリゴン < マーカー
map.createPane('polygonsPane');
map.getPane('polygonsPane').style.zIndex = 400;

map.createPane('markersPane');
map.getPane('markersPane').style.zIndex = 650; // markerPane(600)より上

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Settings を「地図の右上」に出す（Leaflet Control）
const SettingsControl = L.Control.extend({
  options: { position: 'topright' },
  onAdd: function () {
    const container = L.DomUtil.create('div', 'leaflet-control-settings');
    const btn = L.DomUtil.create('a', 'leaflet-control-settings-btn', container);
    btn.href = 'settings.html';
    btn.textContent = 'Settings';
    btn.setAttribute('role', 'button');

    // 地図のドラッグ等を邪魔しない
    L.DomEvent.disableClickPropagation(container);
    L.DomEvent.disableScrollPropagation(container);
    return container;
  }
});
map.addControl(new SettingsControl());

// 京都府が最初に入る（ざっくり）
map.fitBounds([[34.85, 134.85],[35.75, 136.10]]);

/** ---------- Colors / Legend ---------- */
function wbgtColor(w) {
  if (w == null || isNaN(w)) return "#cccccc";
  if (w >= 31) return "#ff0000"; // 危険
  if (w >= 28) return "#ff7f00"; // 厳重警戒
  if (w >= 25) return "#ffff00"; // 警戒
  if (w >= 21) return "#7fffd4"; // 注意
  return "#00bfff";              // ほぼ安全
}

// 凡例
var legend = L.control({position: 'bottomright'});
legend.onAdd = function() {
  var div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <div style="font-weight:700; margin-bottom:6px;">WBGT（屋外近似）</div>
    <div class="row"><i style="background:${wbgtColor(32)}"></i>危険（31以上）</div>
    <div class="row"><i style="background:${wbgtColor(29)}"></i>厳重警戒（28–30.9）</div>
    <div class="row"><i style="background:${wbgtColor(26)}"></i>警戒（25–27.9）</div>
    <div class="row"><i style="background:${wbgtColor(22)}"></i>注意（21–24.9）</div>
    <div class="row"><i style="background:${wbgtColor(20)}"></i>ほぼ安全（〜20.9）</div>
    <div class="row"><i style="background:#cccccc"></i>データなし</div>
    <hr style="border:none; border-top:1px solid #ddd; margin:8px 0;">

    <div class="row">
      <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
        <input id="toggle-hospitals" type="checkbox" checked>
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#3388ff;"></span>
        病院
      </label>
    </div>  `;
  return div;
};
legend.addTo(map);

/** ---------- WBGT calculation (outdoor-ish) ---------- */
function wetBulbStull(T, RH) {
  const rh = Math.min(100, Math.max(0, RH));
  return (
    T * Math.atan(0.151977 * Math.sqrt(rh + 8.313659)) +
    Math.atan(T + rh) -
    Math.atan(rh - 1.676331) +
    0.00391838 * Math.pow(rh, 1.5) * Math.atan(0.023101 * rh) -
    4.686035
  );
}

async function fetchDailyMaxWbgtOutdoor(lat, lon) {
  const start = "2025-08-01";
  const end   = "2025-08-01";
  const url =
    "https://archive-api.open-meteo.com/v1/archive" +
    `?latitude=${lat}&longitude=${lon}` +
    `&start_date=${start}&end_date=${end}` +
    "&hourly=temperature_2m,relative_humidity_2m,wind_speed_10m,shortwave_radiation" +
    "&timezone=Asia%2FTokyo";

  const res = await fetchWithTimeout(url, 8000);
  if (!res.ok) throw new Error("Open-Meteo failed HTTP " + res.status);
  const j = await res.json();

  const T  = j.hourly?.temperature_2m;
  const RH = j.hourly?.relative_humidity_2m;
  const V  = j.hourly?.wind_speed_10m;        // m/s
  const SR = j.hourly?.shortwave_radiation;   // W/m^2
  if (!T || !RH || !V || !SR || T.length === 0) return null;

  let max = null;
  for (let i = 0; i < T.length; i++) {
    const t = T[i], rh = RH[i], v = V[i], sr = SR[i];
    if (t == null || rh == null || v == null || sr == null) continue;

    const Tw = wetBulbStull(t, rh);

    // 黒球温度の超ざっくり推定
    let Tg = t + 0.015 * sr - 0.6 * v;
    if (sr < 50) Tg = t;        // 夜間は補正しない
    if (Tg < t - 2) Tg = t - 2;
    if (Tg > t + 25) Tg = t + 25;

    const wbgt = 0.7 * Tw + 0.2 * Tg + 0.1 * t;
    if (isFinite(wbgt)) max = (max == null) ? wbgt : Math.max(max, wbgt);
  }
  return max;
}

async function fetchWithTimeout(url, timeoutMs = 8000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeoutMs);

  try {
    const res = await fetch(url, { signal: controller.signal });
    return res;
  } finally {
    clearTimeout(id);
  }
}

/** ---------- Draw municipalities + color by WBGT ---------- */
let muniLayer = null;

fetch("kyoto_municipalities.geojson")
  .then(r => {
    if (!r.ok) throw new Error("GeoJSON fetch failed HTTP " + r.status);
    return r.json();
  })
  .then(async geo => {
    muniLayer = L.geoJSON(geo, {
      pane: 'polygonsPane',
      style: () => ({ color:"#333", weight:1, fillColor:"#cccccc", fillOpacity:0.40 }),
      onEachFeature: (feature, lyr) => {
        const p = feature.properties || {};
        const name = p.N03_004 || p.N03_003 || p.name || p.NAME || "unknown";
        lyr.bindPopup(`${name}<br>WBGT(2025/08/01 日最大・屋外近似): 計算中...`);
      }
    }).addTo(map);

    // いったん境界でフィット
    map.fitBounds(muniLayer.getBounds().pad(0.05));

    // 各市町村の代表点（BBox中心）でWBGT取得 → 塗り替え
    const tasks = [];
    muniLayer.eachLayer(lyr => {
      const p = lyr.feature?.properties || {};
      const name = p.N03_004 || p.N03_003 || p.name || p.NAME || "unknown";
      const c = lyr.getBounds().getCenter();
      tasks.push((async () => {
        const w = await fetchDailyMaxWbgtOutdoor(c.lat, c.lng);
        return { lyr, name, w };
      })());
    });

    const results = await Promise.allSettled(tasks);
    results.forEach(r => {
      if (r.status !== "fulfilled") return;
      const { lyr, name, w } = r.value;
      lyr.setStyle({ fillColor: wbgtColor(w), fillOpacity: 0.45, color:"#333", weight:1 });
      lyr.bindPopup(`${name}<br>WBGT(2025/08/01 日最大・屋外近似): ${w == null ? "N/A" : w.toFixed(1)}`);
    });

    map.on('moveend', async () => {

      if (!muniLayer) return;

      muniLayer.eachLayer(async (lyr) => {

        // まだ灰色＝未完了だけ再実行
        if (lyr.options.fillColor !== "#cccccc") return;

        const p = lyr.feature?.properties || {};
        const name = p.N03_004 || p.N03_003 || p.name || p.NAME || "unknown";
        const c = lyr.getBounds().getCenter();

        try {
          const w = await fetchDailyMaxWbgtOutdoor(c.lat, c.lng);

          lyr.setStyle({
            fillColor: wbgtColor(w),
            fillOpacity: 0.45,
            color:"#333",
            weight:1
          });

          lyr.bindPopup(`${name}<br>WBGT(2025/08/01 日最大・屋外近似): ${w == null ? "N/A" : w.toFixed(1)}`);

        } catch(e) {
          // 失敗したらそのまま（次の移動で再挑戦）
        }
      });

    });
  })
  .catch(err => {
    console.error(err);
    alert("市町村の読み込み/計算エラー: " + err.message);
  });

/** ---------- Hospitals (H=26 only) ---------- */
const hospitalLayer = L.layerGroup().addTo(map);

// 凡例のチェックボックスで病院レイヤーON/OFF
setTimeout(() => {
  const cb = document.getElementById('toggle-hospitals');
  if (!cb) return;

  cb.addEventListener('change', () => {
    if (cb.checked) {
      hospitalLayer.addTo(map);
    } else {
      map.removeLayer(hospitalLayer);
    }
  });
}, 0);

fetch("HospitalPlaceData.xlsx")
  .then(res => {
    if (!res.ok) throw new Error("XLSX fetch failed HTTP " + res.status);
    return res.arrayBuffer();
  })
  .then(data => {
    const workbook = XLSX.read(data, { type: 'array' });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

    let count = 0;
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];

      // H列=26
      const hVal = parseFloat(String(row[7]).trim());
      if (hVal !== 26) continue;

      const lat = parseFloat(String(row[10]).trim()); // K
      const lng = parseFloat(String(row[11]).trim()); // L
      if (!isNaN(lat) && !isNaN(lng) && lat !== 0 && lng !== 0) {
        // circleMarker にすると塗りの上でも見やすい（paneで最前面）
        L.circleMarker([lat, lng], {
          pane: 'markersPane',
          radius: 4,
          weight: 1,
          fillOpacity: 0.9
        }).addTo(hospitalLayer);
        count++;
      }
    }
    console.log("Hospitals plotted:", count);
  })
  .catch(err => {
    console.error(err);
    alert("病院の読み込みエラー: " + err.message);
  });


  document.getElementById("startSimulationBtn").addEventListener("click", async () => {
  try {
    // ① 十字（地図中心）を取得
    const center = map.getCenter();
    const startLat = center.lat;
    const startLon = center.lng; // Leafletはlngだが、HospitalLibはlon引数なので変数名だけlonにしてる

    // ② 最寄り病院を取得（hospital.jsの戻り値形式に対応）
    const result = HospitalLib.estimateTimeToNearestHospital(startLat, startLon);
    const h = result.hospital;

    if (!h) {
      alert("最寄り病院が見つかりません");
      return;
    }

    const hospitalLat = h.lat;
    const hospitalLon = h.lon;

    if (![startLat, startLon, hospitalLat, hospitalLon].every(Number.isFinite)) {
      console.error("Invalid coords:", { startLat, startLon, hospitalLat, hospitalLon, h });
      alert("座標が不正です（NaNなど）。コンソールを見てください。");
      return;
    }

    // ③ OSRMでルート取得（driving）
    const url = `https://router.project-osrm.org/route/v1/driving/${startLon},${startLat};${hospitalLon},${hospitalLat}?overview=full&geometries=geojson`;

    const response = await fetch(url);

    // HTTPがそもそも失敗してたらここで分かる
    if (!response.ok) {
      const text = await response.text().catch(() => "");
      console.error("OSRM HTTP error:", response.status, text);
      alert(`OSRM HTTP error: ${response.status}`);
      return;
    }

    const data = await response.json();
    console.log("OSRM response:", data);

    // OSRMの失敗理由を出す（超重要）
    if (data.code && data.code !== "Ok") {
      console.error("OSRM error:", data.code, data.message);
      alert(`OSRM error: ${data.code}\n${data.message || ""}`);
      return;
    }

    if (!data.routes || data.routes.length === 0) {
      alert("ルートが見つかりません（routesが空）");
      return;
    }

    const routeGeoJSON = data.routes[0].geometry;

    // ④ 既存ルート削除
    if (simulationRouteLayer) {
      map.removeLayer(simulationRouteLayer);
    }

    // ⑤ ルート描画
    simulationRouteLayer = L.geoJSON(routeGeoJSON, {
      style: { color: "red", weight: 5 }
    }).addTo(map);

    // ⑥ 地図をルート範囲にフィット（病院が範囲に入る）
    map.fitBounds(simulationRouteLayer.getBounds());

    // デバッグ用（任意）
    console.log(`Nearest hospital: ${h.name}`, result);

  } catch (e) {
    console.error(e);
    alert(e.message || "シミュレーション開始に失敗しました");
  }
});
</script>
</body>
</html>
